<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curator Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            padding: 20px;
            line-height: 1.6;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { margin-bottom: 30px; font-size: 32px; color: #fff; }
        h2 { margin: 30px 0 15px 0; font-size: 20px; color: #fff; border-bottom: 2px solid #333; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
        }
        .card h3 { font-size: 14px; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        .card .value { font-size: 32px; font-weight: bold; color: #4CAF50; }
        .card .label { font-size: 12px; color: #666; margin-top: 5px; }
        .status-good { color: #4CAF50; }
        .status-warning { color: #FF9800; }
        .status-error { color: #f44336; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 8px;
        }
        .badge.watchlist { background: #4CAF50; color: white; }

        .deal-item {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #2196F3;
        }
        .deal-item.concert { border-left-color: #9C27B0; }
        .deal-item.watchlist-hit { border-left-color: #4CAF50; }
        .deal-item h4 { margin-bottom: 10px; font-size: 16px; }
        .deal-item .meta { font-size: 14px; color: #888; margin-bottom: 5px; }
        .deal-item .meta span { margin-right: 15px; }

        .config-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #222;
        }
        .config-item:last-child { border-bottom: none; }
        .config-label { color: #888; }
        .config-value { color: #fff; font-weight: 500; }

        button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }
        button:hover { background: #1976D2; }
        button.secondary { background: #666; }
        button.secondary:hover { background: #555; }

        input, select {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            width: 100%;
            margin-bottom: 10px;
        }

        .watchlist-form {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 10px;
            align-items: end;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .watchlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border: 1px solid #333;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #1a1a1a;
        }
        .watchlist-item:hover { background: #222; }
        .watchlist-info { flex: 1; }
        .watchlist-name { font-size: 16px; font-weight: 500; margin-bottom: 5px; }
        .watchlist-meta { font-size: 12px; color: #888; }
        .watchlist-actions { display: flex; gap: 10px; align-items: center; }
        .btn-small {
            padding: 5px 12px;
            font-size: 12px;
            margin: 0;
        }
        .btn-danger { background: #f44336; }
        .btn-danger:hover { background: #d32f2f; }

        .agent-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .agent-name { font-size: 18px; font-weight: bold; }
        .agent-status { font-size: 12px; padding: 4px 8px; border-radius: 4px; }
        .agent-status.enabled { background: #4CAF50; color: white; }
        .agent-status.disabled { background: #666; color: white; }

        .run-log {
            font-size: 12px;
            padding: 8px;
            background: #0f0f0f;
            border-radius: 4px;
            margin-top: 10px;
            color: #888;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #333;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .tab:hover { color: #fff; }
        .tab.active {
            border-bottom-color: #2196F3;
            color: #fff;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="section-header">
            <h1>🎯 Curator Dashboard</h1>
            <button onclick="loadData()">🔄 Refresh</button>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Total Deals</h3>
                <div class="value" id="total-deals">-</div>
                <div class="label">All time</div>
            </div>
            <div class="card">
                <h3>Watchlist Hits</h3>
                <div class="value" id="watchlist-hits">-</div>
                <div class="label">Tracked items</div>
            </div>
            <div class="card">
                <h3>Last Run</h3>
                <div class="value" id="last-run" style="font-size: 18px;">-</div>
                <div class="label" id="last-run-status">Checking...</div>
            </div>
            <div class="card">
                <h3>System Health</h3>
                <div class="value status-good" id="health-status">●</div>
                <div class="label" id="health-text">All systems operational</div>
            </div>
        </div>

        <h2>
            <span>Agents</span>
        </h2>
        <div id="agents-list"></div>

        <h2>
            <span>Watchlist</span>
            <button class="secondary" onclick="toggleWatchlistForm()">+ Add Item</button>
        </h2>
        <div class="card">
            <div class="watchlist-form" id="watchlist-form" style="display: none;">
                <input type="text" id="watch-name" placeholder="Item name (e.g., Elden Ring, Taylor Swift)" />
                <input type="text" id="watch-appid" placeholder="App/Event ID (optional)" />
                <select id="watch-source">
                    <option value="steam">Steam</option>
                    <option value="ticketmaster">Ticketmaster</option>
                </select>
                <button onclick="addWatchlist()">Add</button>
            </div>
            <div id="watchlist-items"></div>
        </div>

        <h2>Recent Deals</h2>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('all')">All Deals</div>
            <div class="tab" onclick="switchTab('watchlist')">Watchlist Hits</div>
            <div class="tab" onclick="switchTab('games')">Games</div>
            <div class="tab" onclick="switchTab('concerts')">Concerts</div>
        </div>
        <div id="tab-all" class="tab-content active"></div>
        <div id="tab-watchlist" class="tab-content"></div>
        <div id="tab-games" class="tab-content"></div>
        <div id="tab-concerts" class="tab-content"></div>
    </div>

    <script>
        let globalConfig = null;
        let globalDeals = [];

        async function loadData() {
            try {
                // Load config
                const configRes = await fetch('/config');
                globalConfig = await configRes.json();

                // Load stats
                const statsRes = await fetch('/feed/stats');
                const stats = await statsRes.json();
                document.getElementById('total-deals').textContent = stats.total_deals || 0;

                // Load runs
                const runsRes = await fetch('/runs?limit=10');
                const runs = await runsRes.json();

                if (runs.runs && runs.runs.length > 0) {
                    const lastRun = runs.runs[0];
                    const runDate = new Date(lastRun.run_at);
                    const now = new Date();
                    const hoursSince = Math.floor((now - runDate) / 1000 / 60 / 60);

                    document.getElementById('last-run').textContent = runDate.toLocaleString();
                    document.getElementById('last-run-status').textContent = `${hoursSince} hours ago - ${lastRun.status}`;

                    // Health status
                    if (hoursSince < 25) {
                        document.getElementById('health-status').className = 'value status-good';
                        document.getElementById('health-text').textContent = 'All systems operational';
                    } else {
                        document.getElementById('health-status').className = 'value status-warning';
                        document.getElementById('health-text').textContent = 'No recent runs';
                    }
                }

                // Render agents with run history
                renderAgents(globalConfig, runs.runs || []);

                // Load watchlist
                const watchlistRes = await fetch('/watchlist');
                const watchlist = await watchlistRes.json();
                renderWatchlist(watchlist.watchlist || [], globalConfig);

                // Load deals
                const dealsRes = await fetch('/feed?limit=100');
                globalDeals = dealsRes.ok ? (await dealsRes.json()).deals : [];

                // Update watchlist hits count
                const watchlistHits = globalDeals.filter(d => d.watchlist_hit).length;
                document.getElementById('watchlist-hits').textContent = watchlistHits;

                // Render deals in tabs
                renderDealsInTabs(globalDeals);

            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function getAgentIcon(agentId) {
            const icons = {
                'steam': '🎮',
                'concert': '🎵',
                'ticketmaster': '🎵'
            };
            return icons[agentId] || '📦';
        }

        function renderAgents(config, runs) {
            if (!config || !config.agents) return;

            let html = '';
            config.agents.forEach(agent => {
                const icon = getAgentIcon(agent.id);
                const statusClass = agent.enabled ? 'enabled' : 'disabled';
                const statusText = agent.enabled ? 'Enabled' : 'Disabled';

                // Get last run for this agent
                const agentRuns = runs.filter(r => r.agent_id === agent.id);
                const lastRun = agentRuns[0];

                html += `<div class="agent-card">
                    <div class="agent-header">
                        <div>
                            <span class="agent-name">${icon} ${agent.id.charAt(0).toUpperCase() + agent.id.slice(1)}</span>
                            <span class="agent-status ${statusClass}">${statusText}</span>
                        </div>
                        <button class="btn-small" onclick="runAgent('${agent.id}')">▶ Run Now</button>
                    </div>
                    <div class="config-item">
                        <span class="config-label">Schedule</span>
                        <span class="config-value">${agent.schedule}</span>
                    </div>`;

                // Agent-specific filters
                if (agent.id === 'steam') {
                    html += `<div class="config-item">
                        <span class="config-label">Min Discount</span>
                        <span class="config-value">${agent.filters.min_discount || config.global_min_discount}%</span>
                    </div>
                    <div class="config-item">
                        <span class="config-label">Min Rating</span>
                        <span class="config-value">${agent.filters.min_rating !== null ? agent.filters.min_rating : config.global_min_rating}/10</span>
                    </div>
                    <div class="config-item">
                        <span class="config-label">Mac Only</span>
                        <span class="config-value">${agent.filters.mac_only ? '✓ Yes' : '✗ No'}</span>
                    </div>`;
                } else if (agent.id === 'concert') {
                    const locations = agent.filters.genres || [];
                    html += `<div class="config-item">
                        <span class="config-label">Locations</span>
                        <span class="config-value">${locations.join(', ') || 'All'}</span>
                    </div>`;
                }

                // Last run info
                if (lastRun) {
                    const runDate = new Date(lastRun.run_at);
                    const statusIcon = lastRun.status === 'success' ? '✅' : '❌';
                    html += `<div class="run-log">
                        ${statusIcon} Last run: ${runDate.toLocaleString()} - ${lastRun.deals_found} deals found
                    </div>`;
                }

                html += `</div>`;
            });

            document.getElementById('agents-list').innerHTML = html;
        }

        function renderWatchlist(items, config) {
            if (items.length === 0) {
                document.getElementById('watchlist-items').innerHTML = '<div class="empty-state">No watchlist items yet. Add items to track specific games or concerts!</div>';
                return;
            }

            let html = '';
            items.forEach(item => {
                // Find relevant agent config to show discount threshold
                const agent = config.agents.find(a => a.id === 'steam' && item.source === 'steam') ||
                             config.agents.find(a => a.id === 'concert' && item.source === 'ticketmaster');

                let threshold = '';
                if (agent && item.source === 'steam') {
                    const minDiscount = agent.filters.min_discount !== null ? agent.filters.min_discount : config.global_min_discount;
                    threshold = `Watching for ${minDiscount}%+ discount`;
                } else if (item.source === 'ticketmaster') {
                    threshold = 'Watching all events';
                }

                html += `<div class="watchlist-item">
                    <div class="watchlist-info">
                        <div class="watchlist-name">${item.name}</div>
                        <div class="watchlist-meta">
                            ${item.source.toUpperCase()}
                            ${item.app_id ? ` • ID: ${item.app_id}` : ''}
                            ${threshold ? ` • ${threshold}` : ''}
                        </div>
                    </div>
                    <div class="watchlist-actions">
                        <button class="btn-small btn-danger" onclick="removeWatchlist(${item.id})">Remove</button>
                    </div>
                </div>`;
            });
            document.getElementById('watchlist-items').innerHTML = html;
        }

        function renderDealsInTabs(deals) {
            // All deals
            renderDealsList(deals, 'tab-all');

            // Watchlist hits
            const watchlistDeals = deals.filter(d => d.watchlist_hit);
            renderDealsList(watchlistDeals, 'tab-watchlist', 'No watchlist hits yet');

            // Games
            const gameDeals = deals.filter(d => d.agent_id === 'steam');
            renderDealsList(gameDeals, 'tab-games', 'No game deals found');

            // Concerts
            const concertDeals = deals.filter(d => d.agent_id === 'concert');
            renderDealsList(concertDeals, 'tab-concerts', 'No concerts found');
        }

        function renderDealsList(deals, containerId, emptyMessage = 'No deals found yet') {
            const container = document.getElementById(containerId);

            if (deals.length === 0) {
                container.innerHTML = `<div class="empty-state">${emptyMessage}</div>`;
                return;
            }

            let html = '';
            deals.forEach(deal => {
                const isConcert = deal.agent_id === 'concert';
                const classes = ['deal-item'];
                if (isConcert) classes.push('concert');
                if (deal.watchlist_hit) classes.push('watchlist-hit');

                html += `<div class="${classes.join(' ')}">
                    <h4>
                        ${deal.icon} ${deal.name}
                        ${deal.watchlist_hit ? '<span class="badge watchlist">WATCHLIST</span>' : ''}
                    </h4>
                    <div class="meta">`;

                if (isConcert) {
                    html += `<span>📅 ${deal.raw.date}${deal.raw.time ? ' at ' + deal.raw.time : ''}</span>`;
                    html += `<span>📍 ${deal.raw.location}</span>`;
                } else {
                    html += `<span>💰 ${deal.discount_pct}% OFF</span>`;
                    html += `<span>$${deal.sale_price.toFixed(2)} (was $${deal.original_price.toFixed(2)})</span>`;
                    if (deal.rating) html += `<span>⭐ ${deal.rating}/10</span>`;
                    if (deal.mac) html += `<span>🍎 Mac</span>`;
                    html += `<span>📅 ${deal.found_at}</span>`;
                }

                html += `</div></div>`;
            });

            container.innerHTML = html;
        }

        function toggleWatchlistForm() {
            const form = document.getElementById('watchlist-form');
            form.style.display = form.style.display === 'none' ? 'grid' : 'none';
        }

        async function addWatchlist() {
            const name = document.getElementById('watch-name').value;
            const appId = document.getElementById('watch-appid').value;
            const source = document.getElementById('watch-source').value;

            if (!name) {
                alert('Please enter an item name');
                return;
            }

            try {
                const res = await fetch('/watchlist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, app_id: appId || null, source })
                });

                if (res.ok) {
                    document.getElementById('watch-name').value = '';
                    document.getElementById('watch-appid').value = '';
                    document.getElementById('watchlist-form').style.display = 'none';
                    loadData();
                } else {
                    alert('Failed to add watchlist item');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function removeWatchlist(itemId) {
            if (!confirm('Remove this item from watchlist?')) {
                return;
            }

            try {
                const res = await fetch(`/watchlist/${itemId}`, {
                    method: 'DELETE'
                });

                if (res.ok) {
                    loadData();
                } else {
                    alert('Failed to remove watchlist item');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function runAgent(agentId) {
            if (!confirm(`Run the ${agentId} agent now?`)) {
                return;
            }

            try {
                const res = await fetch('/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id: agentId })
                });

                if (res.ok) {
                    const result = await res.json();
                    alert(`Agent ${agentId} completed!\nDeals found: ${result.total_deals}`);
                    loadData();
                } else {
                    alert('Failed to run agent');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function switchTab(tabName) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            // Update tab content
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        // Load data on page load
        loadData();

        // Auto-refresh every 60 seconds
        setInterval(loadData, 60000);
    </script>
</body>
</html>
